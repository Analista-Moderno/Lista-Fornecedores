<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Lista Top Fornecedores</title>
  <style>
    :root {
      --vdm: #1f6bc1;
      --vdm-light: #f3e8fa;
      --vdm-dark: #1f6bc1;
      --bg: #f5f5f5;
      --card: #ffffff;
      --text: #1a1a1a;
      --sub: #666;
      --border: #e0e0e0;
      --radius: 12px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: #fff;
      padding: 16px 16px 0;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .header-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      color: #222;
      white-space: nowrap;
    }

    .logo span {
      color: var(--vdm);
    }

    .count-badge {
      background: var(--vdm-light);
      color: var(--vdm);
      font-size: 12px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 20px;
      margin-left: auto;
      white-space: nowrap;
    }

    .search-wrap {
      position: relative;
      margin-bottom: 12px;
    }

    .search-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--sub);
      pointer-events: none;
    }

    #search {
      width: 100%;
      padding: 10px 12px 10px 38px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: 15px;
      outline: none;
      background: var(--bg);
      color: var(--text);
      transition: border-color 0.2s;
    }

    #search:focus {
      border-color: var(--vdm);
    }

    #search::placeholder {
      color: #aaa;
    }

    /* CATEGORY TABS SCROLL */
    .tabs-wrap {
      overflow-x: auto;
      display: flex;
      gap: 8px;
      padding-bottom: 12px;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .tabs-wrap::-webkit-scrollbar {
      display: none;
    }

    .tab-btn {
      flex-shrink: 0;
      padding: 7px 14px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: #fff;
      color: var(--sub);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .tab-btn.active,
    .tab-btn:active {
      background: var(--vdm);
      border-color: var(--vdm);
      color: #fff;
    }

    /* CONTENT */
    main {
      padding: 16px;
      padding-bottom: 32px;
    }

    /* CATEGORY SECTIONS */
    .category {
      margin-bottom: 8px;
      border-radius: var(--radius);
      background: var(--card);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .category-header {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      cursor: pointer;
      user-select: none;
      gap: 10px;
    }

    .cat-icon {
      font-size: 20px;
      flex-shrink: 0;
    }

    .cat-title {
      font-size: 15px;
      font-weight: 600;
      flex: 1;
      color: var(--text);
    }

    .cat-count {
      font-size: 12px;
      color: var(--sub);
      background: var(--bg);
      padding: 2px 8px;
      border-radius: 12px;
    }

    .cat-arrow {
      color: var(--sub);
      font-size: 18px;
      transition: transform 0.25s;
      flex-shrink: 0;
    }

    .category.open .cat-arrow {
      transform: rotate(180deg);
    }

    .category-body {
      display: none;
      padding: 0 12px 12px;
      gap: 8px;
      flex-direction: column;
    }

    .category.open .category-body {
      display: flex;
    }

    /* SUPPLIER CARD */
    .supplier-card {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--bg);
      border-radius: 10px;
      padding: 11px 12px;
      border: 1px solid var(--border);
    }

    .supplier-info {
      flex: 1;
      min-width: 0;
    }

    .supplier-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .supplier-location {
      font-size: 12px;
      color: var(--sub);
      margin-top: 2px;
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .supplier-tag {
      font-size: 11px;
      background: var(--vdm-light);
      color: var(--vdm);
      padding: 1px 7px;
      border-radius: 10px;
      margin-top: 4px;
      display: inline-block;
    }

    .btn-link {
      flex-shrink: 0;
      background: var(--vdm);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px 14px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-link:active {
      background: var(--vdm-dark);
    }

    /* NO RESULTS */
    .no-results {
      text-align: center;
      padding: 48px 24px;
      color: var(--sub);
      display: none;
    }

    .no-results svg {
      margin-bottom: 12px;
      opacity: 0.4;
    }

    .no-results p {
      font-size: 15px;
    }

    /* SEARCH RESULTS MODE */
    .search-list {
      display: none;
      flex-direction: column;
      gap: 8px;
    }

    .search-list.visible {
      display: flex;
    }

    .categories-list.hidden {
      display: none;
    }

    .search-cat-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--vdm);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 4px;
      margin-bottom: 2px;
      padding-left: 2px;
    }

    mark {
      background: #f9d6ff;
      color: var(--vdm-dark);
      border-radius: 3px;
      padding: 0 1px;
    }
  </style>
</head>

    tabsWrap.appendChild(allTab);

      const btn = document.createElement('button');
      btn.className = 'tab-btn';
      btn.textContent = `${cat.icon} ${cat.title}`;
      btn.dataset.cat = cat.id;
      tabsWrap.appendChild(btn);
    });

    // Count total
    const total = DATA.reduce((s, c) => s + c.suppliers.length, 0);
    document.getElementById('totalBadge').textContent = `${total} fornecedores`;

    // Build category sections
    const categoriesList = document.getElementById('categoriesList');

    function buildCard(s, highlight = '') {
      const card = document.createElement('div');
      card.className = 'supplier-card';

      const info = document.createElement('div');
      info.className = 'supplier-info';

      const name = document.createElement('div');
      name.className = 'supplier-name';
      name.innerHTML = highlight ? highlightText(s.name, highlight) : escHtml(s.name);
      info.appendChild(name);

      if (s.loc) {
        const loc = document.createElement('div');
        loc.className = 'supplier-location';
        loc.innerHTML = `<svg width="11" height="11" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>${highlight ? highlightText(s.loc, highlight) : escHtml(s.loc)}`;
        info.appendChild(loc);
      }

      if (s.tag) {
        const tag = document.createElement('div');
        tag.className = 'supplier-tag';
        tag.textContent = s.tag;
        info.appendChild(tag);
      }

      const link = document.createElement('a');
      link.className = 'btn-link';
      link.href = s.url;
      link.target = '_blank';
      link.rel = 'noopener noreferrer';
      link.innerHTML = `Acessar <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>`;

      card.appendChild(info);
      card.appendChild(link);
      return card;
    }

    function escHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function highlightText(str, q) {
      if (!q) return escHtml(str);
      const escaped = escHtml(str);
      const escapedQ = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      return escaped.replace(new RegExp(escapedQ, 'gi'), m => `<mark>${m}</mark>`);
    }

    DATA.forEach(cat => {
      const section = document.createElement('div');
      section.className = 'category';
      section.dataset.id = cat.id;

      const header = document.createElement('div');
      header.className = 'category-header';
      header.innerHTML = `
    <span class="cat-icon">${cat.icon}</span>
    <span class="cat-title">${cat.title}</span>
    <span class="cat-count">${cat.suppliers.length}</span>
    <span class="cat-arrow">⌄</span>
  `;

      const body = document.createElement('div');
      body.className = 'category-body';

      cat.suppliers.forEach(s => body.appendChild(buildCard(s)));

      header.addEventListener('click', () => {
        section.classList.toggle('open');
      });

      section.appendChild(header);
      section.appendChild(body);
      categoriesList.appendChild(section);
    });

    // Tab filtering
    let activeTab = 'all';
    tabsWrap.addEventListener('click', e => {
      const btn = e.target.closest('.tab-btn');
      if (!btn) return;
      activeTab = btn.dataset.cat;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      // Scroll tab into view
      btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });

      const query = document.getElementById('search').value.trim();
      if (!query) {
        filterCategories(activeTab);
      } else {
        renderSearch(query);
      }
    });

    function filterCategories(catId) {
      document.getElementById('searchList').classList.remove('visible');
      document.getElementById('categoriesList').classList.remove('hidden');
      document.getElementById('noResults').style.display = 'none';

      document.querySelectorAll('.category').forEach(sec => {
        if (catId === 'all' || sec.dataset.id === catId) {
          sec.style.display = '';
        } else {
          sec.style.display = 'none';
        }
      });

      // Auto-open if single category selected
      if (catId !== 'all') {
        document.querySelectorAll('.category').forEach(sec => {
          if (sec.dataset.id === catId) sec.classList.add('open');
        });
      }
    }

    // Search
    const searchInput = document.getElementById('search');
    let searchTimer;

    searchInput.addEventListener('input', () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        const q = searchInput.value.trim();
        if (!q) {
          document.getElementById('searchList').classList.remove('visible');
          document.getElementById('categoriesList').classList.remove('hidden');
          document.getElementById('noResults').style.display = 'none';
          filterCategories(activeTab);
        } else {
          renderSearch(q);
        }
      }, 200);
    });

    function renderSearch(q) {
      const searchList = document.getElementById('searchList');
      const catList = document.getElementById('categoriesList');
      const noResults = document.getElementById('noResults');

      searchList.innerHTML = '';
      const lower = q.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');

      let total = 0;

      DATA.forEach(cat => {
        if (activeTab !== 'all' && cat.id !== activeTab) return;

        const matches = cat.suppliers.filter(s => {
          const haystack = (s.name + ' ' + s.loc + ' ' + (s.tag || '')).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
          return haystack.includes(lower);
        });

        if (matches.length === 0) return;
        total += matches.length;

        const label = document.createElement('div');
        label.className = 'search-cat-label';
        label.textContent = `${cat.icon} ${cat.title}`;
        searchList.appendChild(label);

        matches.forEach(s => searchList.appendChild(buildCard(s, q)));
      });

      if (total === 0) {
        searchList.classList.remove('visible');
        catList.classList.add('hidden');
        noResults.style.display = 'block';
      } else {
        searchList.classList.add('visible');
        catList.classList.add('hidden');
        noResults.style.display = 'none';
      }
    }
